services:
  # --- BASE DE DONNÉES ---
  db:
    image: postgres:16-alpine
    container_name: kanban-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - kanban-network
    ports:
      - "${DB_PORT}:5432"

  # --- API RUST ---
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kanban-api
    restart: unless-stopped
    depends_on:
      - db
    environment:
      # Construct DATABASE_URL using DB_HOST (which can be external) and DB_PORT
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DB_HOST}:${DB_PORT}/${POSTGRES_DB}
      APP_PORT: ${API_INTERNAL_PORT}
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - kanban-network
    ports:
      - "${API_PORT}:${API_INTERNAL_PORT}"

  # --- FRONTEND NEXT.JS ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Construct API URL using API_HOST (which can be external) and API_PORT
        NEXT_PUBLIC_API_URL: http://${API_HOST}:${API_PORT}
    container_name: kanban-ui
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://${API_HOST}:${API_PORT}
      PORT: ${WEB_INTERNAL_PORT}
    networks:
      - kanban-network
    ports:
      - "${WEB_PORT}:${WEB_INTERNAL_PORT}"

# --- CONFIGURATION RÉSEAUX ET VOLUMES ---
networks:
  kanban-network:
    driver: bridge

volumes:
  postgres_data:
